version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
  pre_build:
    commands:
      - echo Installing dependencies...
      - pip install -r requirements.txt
      - pip install pytest pytest-cov
  buld:
    commands:
      - echo Running tests...
      - export PYTHONPATH=.
      - pytest tests/ --cov=app
      - echo Building the application...
      - pip install wheel
      - python setup.py bdist_wheel
  post_build:
    commands:
      - echo Build completed on Tue Mar 24 04:45:41 UTC 2026

artifacts:
  files:
    - appspec.yml
    - app.py
    - templates/**/*
    - requirements.txt
    - scripts/**/*
    - dist/**/*
  discard-paths: no
